<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Green Corridor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, cloneElement } = React;

    // Helper component to render Lucide icons in React without lucide-react
    const Icon = ({ name, className }) => {
      useEffect(() => {
        lucide.createIcons();
      }, [name]);
      return <i data-lucide={name} className={className}></i>;
    };

    function App() {
      // Re-trigger icon creation on mount
      useEffect(() => {
        lucide.createIcons();
      }, []);

      const portals = [
        { title: "User Portal", icon: "smartphone", desc: "Request emergency vehicles, track arrival time, and provide pre-arrival medical details.", color: "from-blue-400 to-blue-600" },
        { title: "Ambulance Portal", icon: "ambulance", desc: "Turn-by-turn AI synced navigation, auto-preemption triggers, and hospital communication.", color: "from-emerald-400 to-emerald-600" },
        { title: "Traffic Control Portal", icon: "traffic-cone", desc: "City-wide dashboard to monitor active corridors, override signals, and view analytics.", color: "from-orange-400 to-orange-600" },
        { title: "Hospital Portal", icon: "hospital", desc: "Live ETA of incoming patients, vital stats relay, and resource management dashboard.", color: "from-purple-400 to-purple-600" }
      ];

      const steps = [
        { icon: "smartphone", label: "User", sub: "Requests Help" },
        { icon: "ambulance", label: "Ambulance", sub: "Dispatched" },
        { icon: "brain-circuit", label: "AI Routing", sub: "Calculates Path" },
        { icon: "traffic-cone", label: "Traffic Control", sub: "Signals Green" },
        { icon: "hospital", label: "Hospital", sub: "Ready for Patient" }
      ];

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-emerald-200">
          
          {/* Navbar Minimal */}
          <nav className="fixed w-full z-50 bg-white/70 backdrop-blur-md border-b border-white/20 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <div className="flex items-center gap-2">
                  <Icon name="zap" className="h-6 w-6 text-emerald-500" />
                  <span className="font-bold text-xl tracking-tight text-slate-900">GreenCorridor</span>
                </div>
                <div className="hidden md:flex gap-6">
                  <a href="#problem" className="text-sm font-medium hover:text-emerald-600 transition-colors">The Problem</a>
                  <a href="#solution" className="text-sm font-medium hover:text-emerald-600 transition-colors">Solution Flow</a>
                  <a href="#portals" className="text-sm font-medium hover:text-emerald-600 transition-colors">Portals</a>
                </div>
              </div>
            </div>
          </nav>

          {/* 1 Hero Section */}
          <section className="pt-32 pb-20 px-4 relative overflow-hidden">
            <div className="max-w-4xl mx-auto text-center">
              <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-100/80 text-emerald-700 text-sm font-semibold mb-6 shadow-sm border border-emerald-200 backdrop-blur-sm">
                <Icon name="activity" className="w-4 h-4 animate-pulse" /> Live in Bangalore
              </div>
              <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight text-slate-900 mb-6 leading-tight">
                Dynamic Green <span className="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-cyan-500">Corridor System</span>
              </h1>
              <p className="text-xl md:text-2xl text-slate-600 mb-10 max-w-3xl mx-auto leading-relaxed">
                AI-powered traffic signal coordination enabling ambulances to reach hospitals faster during critical emergencies.
              </p>
              <div className="flex flex-col sm:flex-row gap-4 justify-center">
                <button className="px-8 py-4 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-lg transition-all shadow-lg hover:shadow-emerald-500/30 flex items-center justify-center gap-2">
                  <Icon name="ambulance" className="w-5 h-5" /> Request Ambulance
                </button>
                <button className="px-8 py-4 rounded-full bg-white text-slate-800 font-bold text-lg transition-all shadow-lg border border-slate-200 hover:border-emerald-300 flex items-center justify-center gap-2">
                  <Icon name="map" className="w-5 h-5 text-emerald-500" /> View Live Simulation
                </button>
              </div>
            </div>
          </section>

          {/* 2 Problem Section */}
          <section id="problem" className="py-20 bg-white">
            <div className="max-w-7xl mx-auto px-4">
              <div className="grid md:grid-cols-2 gap-12 items-center">
                <div>
                  <h2 className="text-3xl font-bold mb-6">The Challenge in Cities Like Bangalore</h2>
                  <p className="text-lg text-slate-600 mb-6 leading-relaxed">
                    Traffic congestion in metropolitan areas is costing lives. Ambulances routinely face delays of 15-30 minutes just navigating through gridlocked intersections, drastically reducing the "golden hour" survival rate for critical patients.
                  </p>
                  <ul className="space-y-4">
                    <li className="flex items-center gap-3 text-slate-700">
                      <div className="w-2 h-2 rounded-full bg-red-500"></div> Traditional sirens are ineffective in dense traffic.
                    </li>
                    <li className="flex items-center gap-3 text-slate-700">
                      <div className="w-2 h-2 rounded-full bg-red-500"></div> Manual intervention by traffic police is slow and uncoordinated.
                    </li>
                  </ul>
                </div>
                <div className="relative rounded-2xl overflow-hidden shadow-2xl bg-slate-800 p-8 border border-slate-700">
                   <div className="absolute inset-0 bg-gradient-to-br from-slate-800 to-slate-900 -z-10"></div>
                   <div className="flex flex-col gap-4 opacity-50">
                      <div className="h-4 w-full bg-red-500 rounded flex items-center justify-center gap-2"><Icon name="ambulance" className="w-3 h-3 text-white"/></div>
                      <div className="h-4 w-3/4 bg-red-400 rounded"></div>
                      <div className="h-4 w-5/6 bg-red-400 rounded"></div>
                      <div className="h-4 w-full bg-red-500 rounded"></div>
                   </div>
                   <div className="absolute inset-0 flex items-center justify-center">
                      <div className="bg-red-500/20 backdrop-blur-md border border-red-500/30 text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2">
                         <span className="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
                         Ambulance Delayed
                      </div>
                   </div>
                </div>
              </div>
            </div>
          </section>

          {/* 3 Solution section */}
          <section id="solution" className="py-20 bg-slate-50 relative">
            <div className="max-w-7xl mx-auto px-4">
              <div className="text-center mb-16">
                <h2 className="text-3xl font-bold mb-4">The Smart Flow</h2>
                <p className="text-lg text-slate-600 max-w-2xl mx-auto">Seamless orchestration from emergency request to hospital arrival.</p>
              </div>
              <div className="flex flex-col md:flex-row justify-between items-center gap-4 relative">
                 <div className="hidden md:block absolute top-1/2 left-0 w-full h-1 bg-gradient-to-r from-emerald-200 via-cyan-300 to-emerald-200 -z-10 -translate-y-1/2 rounded-full"></div>
                 {steps.map((step, i) => (
                   <div key={i} className="flex flex-col items-center group">
                     <div className="w-20 h-20 rounded-2xl bg-white shadow-xl border border-emerald-100 flex items-center justify-center mb-4 transition-transform text-emerald-600 relative overflow-hidden">
                       <Icon name={step.icon} className="w-8 h-8 relative z-10" />
                     </div>
                     <h3 className="font-bold text-slate-800">{step.label}</h3>
                     <span className="text-xs text-slate-500">{step.sub}</span>
                   </div>
                 ))}
              </div>
            </div>
          </section>

          {/* 4 Ecosystem section */}
          <section id="portals" className="py-20 bg-white">
            <div className="max-w-7xl mx-auto px-4">
              <div className="text-center mb-16">
                <h2 className="text-3xl font-bold mb-4">Integrated Ecosystem Portals</h2>
              </div>
              <div className="grid md:grid-cols-2 gap-8">
                {portals.map((portal, i) => (
                  <div key={i} className="p-8 rounded-3xl bg-white border border-slate-100 shadow-xl hover:shadow-2xl transition-all group relative overflow-hidden flex flex-col items-start">
                     <div className="absolute top-0 right-0 p-8 opacity-5">
                        <Icon name={portal.icon} className="w-48 h-48" />
                     </div>
                     <div className={`w-14 h-14 rounded-2xl bg-gradient-to-br ${portal.color} text-white flex items-center justify-center shadow-lg mb-6`}>
                        <Icon name={portal.icon} className="w-7 h-7" />
                     </div>
                     <h3 className="text-2xl font-bold mb-3">{portal.title}</h3>
                     <p className="text-slate-600 leading-relaxed mb-6 flex-grow">{portal.desc}</p>
                     <button className="text-sm font-bold text-slate-800 flex items-center gap-1 border-b-2 border-slate-800 pb-1">
                        Launch Portal &rarr;
                     </button>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* 5 Real-time simulation section */}
          <section className="py-20 bg-slate-900 text-white relative overflow-hidden">
            <div className="max-w-7xl mx-auto px-4 z-10 relative">
              <div className="text-center mb-12">
                <h2 className="text-3xl font-bold mb-4">Real-time Simulation</h2>
                <p className="text-slate-400 max-w-2xl mx-auto">Watch how the AI dynamically clears the path ahead of the ambulance.</p>
              </div>
              <div className="bg-slate-800/80 rounded-3xl border border-slate-700 h-96 relative overflow-hidden shadow-2xl flex items-center justify-center">
                  <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.05)_1px,transparent_1px)] bg-[size:40px_40px]"></div>
                  <div className="absolute top-1/2 left-10 right-10 h-2 bg-slate-700 rounded-full"></div>
                  <div className="absolute top-1/2 left-10 w-1/2 h-2 bg-emerald-500 rounded-full"></div>
                  
                  {/* Signals */}
                  <div className="absolute top-1/2 left-1/3 -mt-6">
                     <div className="w-4 h-12 bg-slate-900 rounded border border-slate-700 flex flex-col justify-around p-1 items-center z-20">
                        <div className="w-2 h-2 rounded-full bg-slate-700"></div>
                        <div className="w-2 h-2 rounded-full bg-slate-700"></div>
                        <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
                     </div>
                  </div>
                   <div className="absolute top-1/2 right-1/3 -mt-6">
                     <div className="w-4 h-12 bg-slate-900 rounded border border-slate-700 flex flex-col justify-around p-1 items-center z-20">
                        <div className="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_10px_#ef4444]"></div>
                        <div className="w-2 h-2 rounded-full bg-slate-700"></div>
                        <div className="w-2 h-2 rounded-full bg-slate-700"></div>
                     </div>
                  </div>

                  {/* Ambulance */}
                  <div className="absolute top-1/2 left-[45%] -mt-4 w-12 h-8 bg-white rounded flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.3)] z-30 border-t-2 border-red-500">
                     <Icon name="ambulance" className="w-5 h-5 text-red-500" />
                  </div>
              </div>
            </div>
          </section>

          {/* 6 Technology stack */}
          <section className="py-20 bg-emerald-50">
            <div className="max-w-7xl mx-auto px-4">
              <div className="text-center mb-16">
                <h2 className="text-3xl font-bold mb-4">Powered by Modern Tech & Proven Impact</h2>
              </div>
              <div className="grid md:grid-cols-3 gap-8 mb-16">
                 <div className="bg-white p-6 rounded-2xl shadow-xl border-t-4 border-emerald-500 text-center">
                     <div className="text-5xl font-extrabold text-emerald-500 mb-2">40%</div>
                     <div className="font-bold text-slate-700">Faster Transit</div>
                 </div>
                 <div className="bg-white p-6 rounded-2xl shadow-xl border-t-4 border-blue-500 text-center">
                     <div className="text-5xl font-extrabold text-blue-500 mb-2">100+</div>
                     <div className="font-bold text-slate-700">Signals Synced</div>
                 </div>
                 <div className="bg-white p-6 rounded-2xl shadow-xl border-t-4 border-cyan-500 text-center">
                     <div className="text-5xl font-extrabold text-cyan-500 mb-2">~15m</div>
                     <div className="font-bold text-slate-700">Golden Minutes Saved</div>
                 </div>
              </div>

              <div className="bg-white/50 backdrop-blur-sm rounded-2xl p-8 border border-white flex flex-wrap justify-center gap-12 items-center">
                 <div className="flex items-center gap-2"><Icon name="server" className="w-6 h-6"/> <span className="font-bold">Node.js</span></div>
                 <div className="flex items-center gap-2"><Icon name="smartphone" className="w-6 h-6"/> <span className="font-bold">React</span></div>
                 <div className="flex items-center gap-2"><Icon name="database" className="w-6 h-6"/> <span className="font-bold">MongoDB</span></div>
                 <div className="flex items-center gap-2"><Icon name="zap" className="w-6 h-6"/> <span className="font-bold">WebSockets</span></div>
                 <div className="flex items-center gap-2"><Icon name="map" className="w-6 h-6"/> <span className="font-bold">Google Maps API</span></div>
                 <div className="flex items-center gap-2"><Icon name="brain-circuit" className="w-6 h-6"/> <span className="font-bold">TensorFlow Routing</span></div>
              </div>
            </div>
          </section>

          <footer className="bg-slate-900 text-slate-400 py-10 text-center text-sm">
             <p>&copy; {new Date().getFullYear()} Dynamic Green Corridor System. Built for Smart City Hackathon.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
